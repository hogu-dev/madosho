server {
  listen 8080;
  root /usr/share/nginx/html;
  index index.html;

  client_max_body_size 200m;   # PDFs/manuals are large; default 1m rejects real docs with a 413

  # API lives under /api/* so backend paths never collide with the SPA's own
  # client-side routes (e.g. /corpora/:id, /documents/:id). The /api/ prefix is
  # stripped before proxying. The query plane is a separate upstream.
  location /api/query { proxy_pass http://query:8001/query; }
  location /api/      { proxy_pass http://app:8000/; }

  location / { try_files $uri /index.html; }   # SPA history fallback: deep links + refresh
}
