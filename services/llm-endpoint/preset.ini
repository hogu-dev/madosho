# llama-server ROUTER-MODE preset for the madosho llm-endpoint EXAMPLE.
#
# ONE multimodal Gemma 4 E4B model that serves every madosho LLM lane from a single
# server: the index-time text lanes (contextual chunker, eval scorer, Scrying Answer)
# AND the vision lane (extraction head-to-head page transcription + judge). llama-server
# loads it on the first request that names it; the weights resolve from your shared
# HuggingFace cache (the bind mount in docker-compose.yml), downloading once on first use.
#
# E4B is natively multimodal: the same repo ships the text GGUF and a vision projector
# (mmproj-BF16.gguf, ~991 MB). With hf-repo/hf-file the mmproj auto-loads from the same
# repo -- no extra key -- so images work with no second model.
#
# Q8_0 (~8 GB) is chosen over Q4_K_M: a 4B judge loses noticeable quality at Q4, and an
# 8 GB+ card fits Q8 fine. Swap hf-file to gemma-4-E4B-it-Q4_K_M.gguf for the
# faster/smaller lane if VRAM is tight.
#
# NOTE: this repo also ships a tiny MTP (multi-token-prediction) head whose filename
# ALSO contains "Q8_0" (MTP/gemma-4-E4B-it-Q8_0-MTP.gguf, ~98 MB). The `repo:Q8_0` quant
# shorthand does loose name-matching and can latch onto that MTP file, which is not a
# standalone model -- llama.cpp then dies with "Gemma4Assistant requires ctx_other to be
# set" and segfaults. So we pin the exact main file with hf-repo + hf-file instead.

[gemma-4-e4b]
hf-repo = unsloth/gemma-4-E4B-it-GGUF
hf-file = gemma-4-E4B-it-Q8_0.gguf
ctx-size = 16384
jinja = true
flash-attn = on
n-gpu-layers = 99
temp = 1.0
top-p = 0.95
top-k = 64
