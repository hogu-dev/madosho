# llama-server ROUTER-MODE preset for the madosho agent-server EXAMPLE.
#
# One endpoint, five US-developed tool-calling models. A request picks its model by name
# (the OpenAI `model` field); llama-server loads it on demand and unloads the previous one
# (--models-max 1 in docker-compose.yml keeps one resident on the GPU at a time). The FIRST
# request to name a model downloads its weights once into your HuggingFace cache -- the
# bind mount in docker-compose.yml -- and that cache is the only place weights ever exist.
# No weights ship with this repo and no image is ever built here. See the README for the
# license each download accepts.
#
# Model choice: every entry is US-developed (origin posture: docs/COMPLIANCE.md in the
# madosho repo). Granite 4.1 leads its size class on
# tool-calling benchmarks (BFCL v3) and is on llama.cpp's documented known-good list; see
# README for the comparison table with measured speeds. CN-developed counterparts
# (Qwen-family servers) live in the separate CN/other-source bundle -- see
# docs/COMPLIANCE.md.
#
#   jinja = true: REQUIRED for tool-calling -- uses the model's own chat template to emit
#     native OpenAI tool_calls. Without it the agent can't call tools.
#   hf-repo resolves the quant by tag (":Q4_K_M"), so no filenames are hardcoded.
#
# THE MoE DIAL (free GPU space): on Mixture-of-Experts models, `n-cpu-moe = N` keeps the
# expert weights of the first N layers in system RAM, so the GPU holds only attention +
# the rest -- trading tokens/s for free VRAM. Measured on gpt-oss-20b (24 GB card):
#     n-cpu-moe = 12  ->  ~7 GB VRAM,  ~39 tok/s   (the shipped default)
#     cpu-moe = true  ->  ~2.4 GB VRAM, ~21 tok/s  (everything-on-CPU endpoint of the dial)
# Dense models (the Granites, Nemotron) have no expert weights to offload -- their knobs
# are quant size and ctx-size only.

# ~17.5 GB download (dense 30B, Q4_K_M). MAX QUALITY: the strongest US-developed tool-caller
# that runs on a 24 GB card -- and it wants the card to itself (measured: ~19 GB VRAM at
# this ctx-size, ~40 tok/s). ctx-size 8192 is what fits next to a desktop's few GB of
# background use; 16384 OOMs a 24 GB card unless it is completely idle. No MoE dial here
# (dense). If you need VRAM headroom, use gpt-oss-20b instead.
[granite-4.1-30b]
hf-repo = unsloth/granite-4.1-30b-GGUF:Q4_K_M
ctx-size = 8192
jinja = true
flash-attn = on
n-gpu-layers = 99

# ~12 GB download (MoE: 21B total / ~3.6B active, native MXFP4 -- single file, no quant
# tag). The FREE-GPU-SPACE pick: with the MoE dial below it runs in ~7 GB VRAM at ~39
# tok/s (measured), leaving most of the card for madosho's own embedders/rerankers or
# your desktop. Two documented quirks for agent loops: at most ONE tool call per response
# (loops just take more round trips), and reliable calling wants reasoning effort HIGH
# (pre-set below).
[gpt-oss-20b]
hf-repo = ggml-org/gpt-oss-20b-GGUF
ctx-size = 32768
jinja = true
flash-attn = on
n-gpu-layers = 99
n-cpu-moe = 12
chat-template-kwargs = {"reasoning_effort":"high"}

# ~5 GB download. The LOW-VRAM pick (~8 GB cards): same family and tool-call format as
# the 30B, usefully weaker -- good for proving flows before spending the big download.
# Measured: ~122 tok/s.
[granite-4.1-8b]
hf-repo = unsloth/granite-4.1-8b-GGUF:Q4_K_M
ctx-size = 16384
jinja = true
flash-attn = on
n-gpu-layers = 99

# ~2.5 GB download. NVIDIA's compact hybrid-Mamba model; scores well on tool-call evals
# for its size and is FAST (measured: ~203 tok/s). Its llama.cpp support is the newest of
# the five (smoke-tested OK; the 30B-A3B sibling is currently broken upstream --
# ggml-org/llama.cpp#20570 -- which is why only the 4B is listed). Weights are under the
# NVIDIA Open Model License, NOT Apache-2.0; downloading = accepting NVIDIA's terms (see
# README). Sampling per NVIDIA's tool-calling guidance.
[nemotron-3-nano-4b]
hf-repo = unsloth/NVIDIA-Nemotron-3-Nano-4B-GGUF:Q4_K_M
ctx-size = 32768
jinja = true
flash-attn = on
n-gpu-layers = 99
temp = 0.6
top-p = 0.95

# ~2 GB download. The CPU-ONLY / smoke-test pick: runs without a GPU (slowly), proves the
# tool-call plumbing end to end. About the floor for usable tool-calling -- prove loops
# here, run research on 8B+.
[granite-4.1-3b]
hf-repo = unsloth/granite-4.1-3b-GGUF:Q4_K_M
ctx-size = 16384
jinja = true
flash-attn = on
n-gpu-layers = 99
