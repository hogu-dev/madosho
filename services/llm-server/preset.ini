# llama-server ROUTER-MODE preset for the madosho llm-server EXAMPLE (CPU text models).
#
# One endpoint, two small CPU instruct models for the QUERY / answer lane. A request
# picks its model by name (the OpenAI `model` field); llama-server loads it on demand
# and unloads the previous one (--models-max 1 in docker-compose.yml). Both resolve from
# the shared HuggingFace cache (the bind mount in docker-compose.yml), so nothing
# re-downloads what `hf download` already fetched.
#
# These are CPU-only (no n-gpu-layers): small enough to answer in a few seconds per
# query on CPU, which is all we need to exercise and learn the retrieve -> augment ->
# generate flow. The vision lane is a SEPARATE server (services/vision-server) on the
# GPU -- keep them apart.
#
# The exact hf-file is pinned on both: these repos ship several quants, and the
# `repo:QUANT` tag shorthand does loose name-matching (the trap that bit the E4B MTP
# head in vision-server). Switch quant by editing hf-file; add models by adding
# [sections].

# Llama 3.2 1B Instruct -- fastest on CPU, coherent enough to watch the flow.
[llama-3.2-1b]
hf-repo = bartowski/Llama-3.2-1B-Instruct-GGUF
hf-file = Llama-3.2-1B-Instruct-Q4_K_M.gguf
ctx-size = 8192
jinja = true

# Qwen2.5 1.5B Instruct -- a bit slower on CPU, noticeably better answers.
# CN-developed (Alibaba); kept as a labeled alternate, downloads only if you
# name it in a request. Origin posture: docs/COMPLIANCE.md in the madosho repo.
[qwen2.5-1.5b]
hf-repo = bartowski/Qwen2.5-1.5B-Instruct-GGUF
hf-file = Qwen2.5-1.5B-Instruct-Q4_K_M.gguf
ctx-size = 8192
jinja = true
