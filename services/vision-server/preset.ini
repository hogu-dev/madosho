# llama-server ROUTER-MODE preset for the madosho vision-server EXAMPLE.
#
# One endpoint, two Gemma 4 vision judges. A request picks its model by name (the OpenAI
# `model` field); llama-server loads it on demand and unloads the previous one
# (--models-max 1 in docker-compose.yml keeps one resident on the GPU at a time). Both
# resolve from the shared HuggingFace cache (the bind mount in docker-compose.yml), so
# nothing re-downloads what `hf download` already fetched. The matching multimodal
# projector (mmproj) auto-loads from the same repo, so images work with no extra key.
#
# Switch models/quants by editing the entries below. Add more [sections] to expose more
# models on the same endpoint.

# Encoder-free 12B "Unified" (tiny 168 MB mmproj). UD-Q4_K_XL is ~7 GB and fits an
# 8 GB+ card. unsloth's recommended quant for the 12B. (This repo has no MTP sidecar,
# so its quant-tag shorthand is unambiguous -- see the E4B note below.)
# THINKING: the 12B Unified thinks by default (chain -> `reasoning_content`, answer ->
# `content`). We DISABLE it below: this lane is per-page transcription/judging, and
# thinking multiplies tokens per page (same treatment as hybrid Qwen-family 14B servers).
# Drop the chat-template-kwargs line to think before judging -- then give it token
# budget: a tight max_tokens cuts it off mid-think with empty content. Even disabled,
# it may emit an empty thought block (harmless). The E4B below answers directly.
[gemma-12b]
hf-repo = unsloth/gemma-4-12b-it-GGUF:UD-Q4_K_XL
ctx-size = 8192
jinja = true
flash-attn = on
n-gpu-layers = 99
temp = 1.0
top-p = 0.95
top-k = 64
chat-template-kwargs = {"enable_thinking":false}

# Native-small E4B with a vision encoder (946 MB mmproj). Q8_0 (~8 GB) is recommended
# for the small model -- Q4 costs more quality on a 4B judge. Swap hf-file to
# gemma-4-E4B-it-Q4_K_M.gguf for the faster/cheaper lane.
#
# NOTE: this repo also ships a tiny MTP (multi-token-prediction) head whose filename
# ALSO contains "Q8_0" (MTP/gemma-4-E4B-it-Q8_0-MTP.gguf, ~98 MB). The `repo:Q8_0` quant
# shorthand does loose name-matching and can latch onto that MTP file, which is not a
# standalone model -- llama.cpp then dies with "Gemma4Assistant requires ctx_other to be
# set" and segfaults. So we pin the exact main file with hf-repo + hf-file instead.
# mmproj still auto-loads from the same repo.
[gemma-e4b]
hf-repo = unsloth/gemma-4-E4B-it-GGUF
hf-file = gemma-4-E4B-it-Q8_0.gguf
ctx-size = 8192
jinja = true
flash-attn = on
n-gpu-layers = 99
temp = 1.0
top-p = 0.95
top-k = 64
